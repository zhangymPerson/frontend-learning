openapi: 3.0.3
info:
  title: 后端学习项目 RBAC 权限管理系统 API
  description: |
    Go + Gin + GORM + SQLite 实现的 RBAC（基于角色的访问控制）权限管理系统接口说明。

    ## 统一响应格式
    所有接口均返回如下 JSON 信封（envelope）：
    ```json
    {
      "code": 200,        // 业务状态码，与 HTTP 状态码保持一致
      "message": "success",
      "data": {}          // 业务数据，结构因接口而异
    }
    ```

    ## 鉴权方式
    除 `POST /api/login` 与 `GET /api/version` 外，其余接口均需在请求头携带 JWT：
    ```
    Authorization: Bearer <token>
    ```
    Token 由登录接口返回，默认有效期 24 小时（见 `config.AppConfig.JWTExpires`）。

    ## 权限控制
    需要认证的接口同时受 RBAC 中间件保护，每个接口标注了其所需的权限编码（如 `user:list`）。
    拥有 `super_admin` 角色的用户可跳过权限校验。
  version: dev
servers:
  - url: http://localhost:8080
    description: 本地开发服务器（默认端口 8080）

tags:
  - name: 认证
    description: 登录与当前用户信息
  - name: 用户管理
  - name: 角色管理
  - name: 权限管理
  - name: 菜单管理
  - name: 部门管理
  - name: 系统

paths:
  /api/login:
    post:
      tags: [认证]
      summary: 用户登录
      description: 校验用户名和密码，成功返回 JWT 与可访问的菜单列表。
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: admin
              password: "123456"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/version:
    get:
      tags: [系统]
      summary: 获取接口版本信息
      description: 无需鉴权。返回构建时通过 -ldflags 注入的版本信息。
      operationId: getVersion
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/VersionInfo"

  /api/me:
    get:
      tags: [认证]
      summary: 获取当前登录用户信息
      description: 返回当前用户及其拥有的权限列表（需认证）。
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
                          permissions:
                            type: array
                            items:
                              $ref: "#/components/schemas/Permission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/users:
    get:
      tags: [用户管理]
      summary: 用户列表（分页 + 关键字搜索）
      description: 所需权限 `user:list`。
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: keyword
          in: query
          description: 用户名/昵称关键字（模糊搜索）
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedUsers"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [用户管理]
      summary: 创建用户
      description: 所需权限 `user:create`。密码经 bcrypt 加密存储，长度至少 6 位。
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/users/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [用户管理]
      summary: 获取单个用户
      description: 所需权限 `user:list`。
      operationId: getUserByID
      security:
        - bearerAuth: []
      responses:
