        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Dept"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/depts/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [部门管理]
      summary: 获取单个部门
      description: 所需权限 `dept:list`。
      operationId: getDeptByID
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Dept"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [部门管理]
      summary: 更新部门
      description: 所需权限 `dept:update`。
      operationId: updateDept
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeptRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Dept"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      tags: [部门管理]
      summary: 删除部门
      description: 所需权限 `dept:delete`。
      operationId: deleteDept
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT 令牌，登录后通过 `Authorization: Bearer <token>` 携带。"

  parameters:
    ID:
      name: id
      in: path
      required: true
      description: 资源主键 ID
      schema:
        type: integer
        format: uint
    Page:
      name: page
      in: query
      description: 页码，默认 1
      schema:
        type: integer
        default: 1
    PageSize:
      name: page_size
      in: query
      description: 每页条数，默认 10
      schema:
        type: integer
        default: 10

  responses:
    BadRequest:
      description: 请求参数错误 / 业务校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未登录 / Token 无效或已过期
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 没有对应权限
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ResponseEnvelope:
      type: object
      properties:
        code:
          type: integer
          description: 业务状态码
          example: 200
        message:
          type: string
          description: 提示信息
          example: success

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: Token 无效或已过期
        error:
          type: string
          description: 详细错误信息（仅参数校验失败时返回）
          example: "Key: 'LoginRequest.Password' Error:Field validation ..."

    VersionInfo:
      type: object
      properties:
        version:
          type: string
          example: dev
        commit_hash:
          type: string
          example: unknown
        build_time:
          type: string
          example: unknown

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: "123456"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT 令牌
        user:
          $ref: "#/components/schemas/User"
        menus:
          type: array
          description: 该用户可访问的菜单列表
          items:
            $ref: "#/components/schemas/Menu"

    User:
      type: object
      description: 密码字段不会返回给前端
      properties:
        ID:
          type: integer
          format: uint
          example: 1
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        username:
          type: string
          example: admin
        nickname:
          type: string
          example: 管理员
        email:
          type: string
          example: admin@example.com
        phone:
          type: string
          example: "13800138000"
        status:
          type: integer
          description: 状态 1=启用 0=禁用
          example: 1
        dept_id:
          type: integer
          format: uint
          description: 部门 ID
          example: 1
        dept:
          $ref: "#/components/schemas/Dept"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          description: 至少 6 位，bcrypt 加密存储
          minLength: 6
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: integer
          description: 状态 1=启用 0=禁用，默认 1
          example: 1
        dept_id:
          type: integer
          format: uint

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: integer
          description: 状态 1=启用 0=禁用
        dept_id:
          type: integer
          format: uint

    PaginatedUsers:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10

    Role:
      type: object
      properties:
        ID:
          type: integer
          format: uint
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        name:
          type: string
          example: 超级管理员
        code:
          type: string
          description: 角色编码（唯一）
          example: super_admin
        sort:
          type: integer
          example: 0
        status:
          type: integer
          description: 状态 1=启用 0=禁用
          example: 1

    CreateRoleRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
        sort:
          type: integer
        status:
          type: integer
          description: 默认 1

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        sort:
          type: integer
        status:
          type: integer

    PaginatedRoles:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    Permission:
      type: object
      properties:
        ID:
          type: integer
          format: uint
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        name:
          type: string
          example: 用户列表
        code:
          type: string
          description: 权限编码（唯一），用于 RBAC 校验
          example: user:list
        type:
          type: string
          description: 类型 menu/button/api，默认 api
          example: api
        parent_id:
          type: integer
          format: uint
          description: 父级权限 ID
        path:
          type: string
          description: 请求路径
          example: /api/users
        method:
          type: string
          description: 请求方法 GET/POST/PUT/DELETE
          example: GET
        sort:
          type: integer
        status:
          type: integer
          description: 状态 1=启用 0=禁用
          example: 1

    CreatePermissionRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
        type:
          type: string
        parent_id:
          type: integer
          format: uint
        path:
          type: string
        method:
          type: string
        sort:
          type: integer
        status:
          type: integer

    UpdatePermissionRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        type:
          type: string
        parent_id:
          type: integer
          format: uint
        path:
          type: string
        method:
          type: string
        sort:
          type: integer
        status:
          type: integer

    Menu:
      type: object
      properties:
        ID:
          type: integer
          format: uint
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        name:
          type: string
          example: 系统管理
        path:
          type: string
          description: 前端路由路径
          example: /system
        component:
          type: string
          description: 前端组件路径
          example: views/system/index.vue
        icon:
          type: string
          example: setting
        sort:
          type: integer
        parent_id:
          type: integer
          format: uint
        status:
          type: integer
          description: 状态 1=启用 0=禁用
          example: 1

    CreateMenuRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        path:
          type: string
        component:
          type: string
        icon:
          type: string
        sort:
          type: integer
        parent_id:
          type: integer
          format: uint
        status:
          type: integer

    UpdateMenuRequest:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        component:
          type: string
        icon:
          type: string
        sort:
          type: integer
        parent_id:
          type: integer
          format: uint
        status:
          type: integer

    Dept:
      type: object
      properties:
        ID:
          type: integer
          format: uint
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        name:
          type: string
          example: 技术部
        parent_id:
          type: integer
          format: uint
        sort:
          type: integer
        status:
          type: integer
          description: 状态 1=启用 0=禁用
          example: 1

    CreateDeptRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        parent_id:
          type: integer
          format: uint
        sort:
          type: integer
        status:
          type: integer

    UpdateDeptRequest:
      type: object
      properties:
        name:
          type: string
        parent_id:
          type: integer
          format: uint
        sort:
          type: integer
        status:
          type: integer
